
<form class="d-flex gap-2 align-items-center" role="search"  (ngSubmit)="onSearch()"
      #searchForm="ngForm">


 <select
    class="form-select"
    name="category"
    [(ngModel)]="searchTitle">
    <option value="">All</option>
    <option value="FEED">Feed</option>
    <option value="SELL">Sell</option>
    <option value="EDIBLE">Edible</option>
  </select>

  <!-- Search button -->
  <button class="btn btn-outline-success" type="submit">
    <i class="fas fa-search"></i>
  </button>

</form>
<h3>Food Feed</h3>
<div
  *ngIf="message"
  class="alert"
  [class.alert-danger]="level === 'error'"
  [class.alert-success]="level === 'success'"
>
{{ message }}
</div>

<hr>

<div class="d-flex justify-content-start gap-2 flex-wrap">
  <app-book-card
   *ngFor="let book of bookResponse.content"
   [book]="book"
   (borrow)="borrowBook($event)"
   ></app-book-card>
</div>

<div *ngIf="!bookResponse?.content?.length">
  <p class="text-center mt-3">No Food found.</p>
</div>

<div *ngIf="bookResponse?.content?.length">
  <div class="d-flex justify-content-center mt-3">
  <nav aria-label="Page navigation example">
    <ul class="pagination">
      <li class="page-item">
        <a
          (click)="goToFirstPage()"
          class="page-link"
          href="javascript:void(0)"
          aria-label="Previous"
          [class.disabled]="page == 0"
        >
          <i class="fa-solid fa-angles-left"></i>
      </a>
      </li>
      <li class="page-item">
        <a
          (click)="goToPreviousPage()"
          class="page-link"
          href="javascript:void(0)"
          aria-label="Previous"
          [class.disabled]="page == 0"

        >
          <i class="fa-solid fa-angle-left"></i>
      </a>
      </li>

      <li
        class="page-item"
        *ngFor="let _ of [].constructor(this.bookResponse.totalPages); let pageIndex = index"
      >
        <a
          (click)="goToPage(pageIndex)"
          class="page-link"
          href="javascript:void(0)"
          aria-label="Previous"
          [class.active]="page == pageIndex"
        >
          {{ pageIndex + 1 }}
      </a>
      </li>

      <li class="page-item">
        <a
          (click)="goToNextPage()"
          class="page-link"
          href="javascript:void(0)"
          aria-label="Next"
          [class.disabled]="isLastPage"
        >
          <i class="fa-solid fa-chevron-right"></i>
      </a>
      </li>
      <li class="page-item">
        <a
          (click)="goToLastPage()"
          class="page-link"
          href="javascript:void(0)"
          aria-label="Previous"
          [class.disabled]="isLastPage"
        >
          <i class="fa-solid fa-angles-right"></i>
      </a>
      </li>
    </ul>
  </nav>
</div>
</div>
